# Только HTTP (порт 80). Использовать при первой установке до получения сертификатов.
# После certbot замените на default.conf из репозитория (он уже с HTTPS) и перезапустите nginx.
server {
    listen 80;
    server_name alleho.ru www.alleho.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
