services:
  app:
    image: svorobyev201/alleho:latest
    restart: always
    environment:
      PORT: "8000"
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      YC_BUCKET: ${YC_BUCKET}
      YC_REGION: ${YC_REGION}
      YC_ACCESS_KEY_ID: ${YC_ACCESS_KEY_ID}
      YC_SECRET_ACCESS_KEY: ${YC_SECRET_ACCESS_KEY}
      ROBOKASSA_LOGIN: ${ROBOKASSA_LOGIN}
      ROBOKASSA_PASSWORD1: ${ROBOKASSA_PASSWORD1}
      ROBOKASSA_PASSWORD2: ${ROBOKASSA_PASSWORD2}
      APP_URL: ${APP_URL}
      COOKIE_SECURE: ${COOKIE_SECURE}
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: materiamedica
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: materiamedica
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data: