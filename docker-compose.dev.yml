
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # Node.js API + WebSocket
    env_file: .env
    environment:
      PORT: "8000"
      NODE_ENV: production
      COOKIE_SECURE: "false"
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      YC_BUCKET: ${YC_BUCKET}
      YC_REGION: ${YC_REGION}
      YC_ACCESS_KEY_ID: ${YC_ACCESS_KEY_ID}
      YC_SECRET_ACCESS_KEY: ${YC_SECRET_ACCESS_KEY}
      ROBOKASSA_LOGIN: ${ROBOKASSA_LOGIN}
      ROBOKASSA_PASSWORD1: ${ROBOKASSA_PASSWORD1}
      ROBOKASSA_PASSWORD2: ${ROBOKASSA_PASSWORD2}
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: materiamedica
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: materiamedica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U materiamedica -d materiamedica"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data: